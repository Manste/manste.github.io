name: Build and Deploy Jekyll Site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: kali-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Inject secrets into _config.yml
        run: |
          sed -i "s|clientSecret:.*|clientSecret: ${{ secrets.GITALK_CLIENT_SECRET }}|" _config.yml
          sed -i "s|clientID:.*|clientID: ${{ secrets.GITALK_CLIENT_ID }}|" _config.yml
          sed -i "s|ga_track_id:.*|ga_track_id: ${{ secrets.GA_TRACK_ID }}|" _config.yml

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site